# Server
server.port=8080

# Database - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/smartride_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=smartride-super-secret-key-that-is-at-least-32-chars-long
jwt.expiration=86400000

# Mail (Gmail example - update credentials)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App name
spring.application.name=smartride

# Razorpay integration (test keys)
razorpay.keyId=
razorpay.keySecret=
